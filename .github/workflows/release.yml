# Publishes via npm Trusted Publishing (OIDC). No NPM_TOKEN.
# Requirements: https://docs.npmjs.com/trusted-publishers
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm and create GitHub Release
    runs-on: ubuntu-latest
    # id-token: write — required for GitHub → npm OIDC exchange
    # contents: write — push version bump + tag, create GitHub Release
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Trusted publishing needs npm CLI ≥ 11.5.1 and Node ≥ 22.14.0 (see npm docs).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify
        run: |
          npm ci
          npm run build
          npm run check:dist
          npm test

      - name: Bump version
        id: version
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $VERSION"

      - name: Commit version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.version }}"

      - name: Tag
        run: git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"

      # Bundled npm on Node may be < 11.5.1; OIDC publish requires npm ≥ 11.5.1
      - name: Use npm CLI with trusted publishing support
        run: npm install -g npm@^11.5.1 && npm --version

      - name: Publish to npm (OIDC)
        run: npm publish --registry https://registry.npmjs.org

      - name: Push main and tag
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        run: gh release create "v${{ steps.version.outputs.version }}" --title "v${{ steps.version.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

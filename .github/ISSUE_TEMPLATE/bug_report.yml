name: Bug report
description: Report a reproducible problem with the backend CLI or generated output.
title: "[Bug]: "
labels: ["bug", "community-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing backend-ai-starter-recipes. Please include enough detail for someone else to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm view backend-ai-starter-recipes version`, `backend-ai-starter-recipes --version`, or the version you installed.
      placeholder: "1.1.0"
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
      placeholder: "npx backend-ai-starter-recipes --preset nestjs-prisma --output ./my-backend"
    validations:
      required: true
  - type: input
    id: preset
    attributes:
      label: Preset or stack
      description: Name the preset or custom stack choices.
      placeholder: "nestjs-prisma"
    validations:
      required: true
  - type: input
    id: output-path
    attributes:
      label: Generated path
      description: Where the CLI wrote files.
      placeholder: "./my-backend"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include errors or broken generated files.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, package manager, OS, shell, database/ORM context, and AI/IDE tool if relevant.
      placeholder: "Node 20.x, npm 10.x, macOS, NestJS, Prisma, Cursor"
    validations:
      required: true
